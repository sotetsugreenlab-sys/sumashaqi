<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>スマシャキ 当日作業</title>
<link rel="apple-touch-icon" href="Saibai%20Cat.png">
<link rel="icon" href="Saibai%20Cat.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="スマシャキ">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: sans-serif; background: #fff; padding: 1rem 0.5rem; }

.today-bar { text-align: center; margin-bottom: 1rem; }
.nav-row { display: flex; align-items: center; justify-content: center; gap: 12px; }
.nav-btn { font-size: 20px; color: #aaa; background: none; border: none; cursor: pointer; padding: 0 4px; line-height: 1; }
.nav-btn:active { color: #1a1a1a; }
.date-big { font-size: 22px; font-weight: 500; color: #1a1a1a; }
.date-sub { font-size: 13px; color: #666; margin-top: 2px; }
.back-today { display: inline-block; margin-top: 6px; font-size: 12px; color: #534AB7; background: #EEEDFE; border: none; border-radius: 20px; padding: 3px 12px; cursor: pointer; }
.ekihi-line { font-size: 14px; font-weight: 500; color: #3B6D11; margin-top: 4px; }

.delivery-banner { background: #E6F1FB; border-radius: 12px; padding: 0.75rem 1.25rem; margin-bottom: 10px; font-size: 15px; font-weight: 500; color: #185FA5; }

.event-banner { background: #FAEEDA; border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 12px; }
.event-banner-title { font-size: 12px; font-weight: 500; color: #854F0B; margin-bottom: 4px; }
.event-banner-item { font-size: 17px; font-weight: 500; color: #633806; line-height: 1.7; }

.card { border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 10px; }
.card-刈取 { background: #FAECE7; }
.card-3穴  { background: #E6F1FB; }
.card-6穴  { background: #EAF3DE; }
.card-30穴 { background: #EEEDFE; }
.card-top { display: flex; align-items: center; justify-content: space-between; }
.card-task { font-size: 15px; font-weight: 500; }
.card-刈取 .card-task { color: #993C1D; }
.card-3穴  .card-task { color: #185FA5; }
.card-6穴  .card-task { color: #3B6D11; }
.card-30穴 .card-task { color: #534AB7; }
.card-sow { font-size: 20px; font-weight: 500; color: #1a1a1a; margin-top: 4px; }
.card-sub { font-size: 12px; color: #666; text-align: right; }
.col-header { display: flex; gap: 8px; margin-bottom: 6px; }
.col-label { flex: 1; font-size: 11px; font-weight: 600; text-align: center; padding: 4px 2px; border-radius: 6px; }
.col-label-old { background: #E6F1FB; color: #185FA5; }
.col-label-new { background: #EAF3DE; color: #3B6D11; }
.stage-row { display: flex; gap: 8px; margin-bottom: 6px; }
.stage-cell { flex: 1; min-width: 0; }
.card.compact { padding: 0.55rem 0.65rem; }
.card.compact .card-top { flex-direction: column; align-items: flex-start; gap: 2px; }
.card.compact .card-task { font-size: 11px; }
.card.compact .card-sow { font-size: 16px; margin-top: 2px; }
.card.compact .card-sub { font-size: 10px; color: #888; text-align: left; }
.card.compact .hist-item, .card.compact .hist-sep { font-size: 10px; }
.card-switched { background: #EAF3DE; border-radius: 12px; padding: 0.6rem 0.7rem; color: #3B6D11; font-size: 11px; font-weight: 500; text-align: center; display: flex; align-items: center; justify-content: center; min-height: 64px; }
.card-placeholder { background: #f9f9f7; border-radius: 12px; padding: 0.6rem 0.7rem; color: #bbb; font-size: 11px; text-align: center; display: flex; align-items: center; justify-content: center; min-height: 64px; border: 1px dashed #e0e0e0; }
.history { margin-top: 8px; padding-top: 8px; border-top: 0.5px solid rgba(0,0,0,0.1); display: flex; flex-wrap: wrap; gap: 6px; }
.hist-item { font-size: 12px; color: #666; }
.hist-item span { font-weight: 500; color: #1a1a1a; }
.hist-sep { font-size: 12px; color: #aaa; }

.calc-box { background: #f5f5f2; border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 10px; }
.calc-title { font-size: 13px; font-weight: 500; color: #666; margin-bottom: 10px; }
.calc-tabs { display: flex; gap: 6px; margin-bottom: 12px; }
.calc-tab { font-size: 13px; padding: 4px 14px; border: 0.5px solid #ccc; border-radius: 20px; background: #fff; color: #666; cursor: pointer; }
.calc-tab.active { background: #EEEDFE; border-color: #AFA9EC; color: #534AB7; font-weight: 500; }
.calc-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
.calc-row label { font-size: 12px; color: #666; min-width: 48px; }
input[type=date] { font-size: 13px; padding: 5px 8px; border: 0.5px solid #ccc; border-radius: 8px; background: #fff; color: #1a1a1a; }
.btn-calc { font-size: 13px; padding: 5px 16px; border: 0.5px solid #AFA9EC; border-radius: 8px; background: #EEEDFE; color: #534AB7; cursor: pointer; font-weight: 500; }
.btn-calc:hover { background: #CECBF6; }
.calc-result { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px; }
.calc-chip { background: #fff; border: 0.5px solid #ccc; border-radius: 8px; padding: 6px 12px; font-size: 13px; color: #1a1a1a; }
.chip-label { font-size: 11px; color: #666; margin-bottom: 2px; display: flex; align-items: center; gap: 4px; }
.chip-day { font-size: 11px; color: #aaa; }
.chip-val { font-weight: 500; font-size: 14px; }

.section-title { font-size: 13px; font-weight: 500; color: #666; margin: 1.5rem 0 0.5rem; }
.sheet-note { font-size: 12px; color: #aaa; margin-bottom: 8px; }
.sheet-note a { color: #534AB7; }
.sync-status { font-size: 12px; color: #aaa; margin-top: 6px; }
.sync-status.ok { color: #3B6D11; }
.sync-status.err { color: #E24B4A; }
</style>
</head>
<body>

<div class="today-bar">
  <div class="nav-row">
    <button class="nav-btn" onclick="navigate(-1)">＜</button>
    <div class="date-big" id="disp-date"></div>
    <button class="nav-btn" onclick="navigate(1)">＞</button>
  </div>
  <div class="date-sub">の作業内容</div>
  <div id="back-today-wrap"></div>
  <div class="ekihi-line" id="ekihi-line" style="display:none"></div>
</div>

<div id="delivery-banner"></div>
<div id="event-banner"></div>
<div id="tasks"></div>

<div class="calc-box">
  <div class="calc-title">栽培日程を計算</div>
  <div class="calc-tabs">
    <button class="calc-tab active" id="tab-sow" onclick="switchTab('sow')">播種日 → 各日程</button>
    <button class="calc-tab" id="tab-harvest" onclick="switchTab('harvest')">刈取日 → 播種日</button>
  </div>
  <div id="panel-sow">
    <div class="calc-row">
      <label>播種日</label>
      <input type="date" id="sow-input" />
      <button class="btn-calc" onclick="calcFromSow()">計算</button>
    </div>
    <div class="calc-result" id="sow-result"></div>
  </div>
  <div id="panel-harvest" style="display:none;">
    <div class="calc-row">
      <label>刈取日</label>
      <input type="date" id="harvest-input" />
      <button class="btn-calc" onclick="calcFromHarvest()">計算</button>
    </div>
    <div class="calc-result" id="harvest-result"></div>
  </div>
</div>

<div class="section-title">イベント登録</div>
<p class="sheet-note">
  イベントは
  <a href="https://docs.google.com/spreadsheets/d/1Ljdufzcvy-BkfzyY6iMU1FqpQxY8fHAXpxyR4hQ81F4/edit" target="_blank">こちらのスプレッドシート</a>
  で管理しています。A列に日付（例：2025-04-16）、B列に内容を入力してください。
</p>
<div class="sync-status" id="sync-status">読み込み中...</div>

<script>
const SHEET_ID = '1Ljdufzcvy-BkfzyY6iMU1FqpQxY8fHAXpxyR4hQ81F4';
const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv`;

// 3/31播種〜4/8播種：旧・新が並行（同じ播種日で両方存在）
// 4/9播種〜：新スケジュールのみ
const SOW_NEW_START = new Date(2026, 2, 31); // 3/31: 新スケジュール開始
const SOW_OLD_END   = new Date(2026, 3, 9);  // 4/9: 旧スケジュール終了（exclusive）

// 液肥管理
const EKIHI_BASE = new Date(2026, 2, 2); // 2026-03-02（入替の基準日）
const EKIHI_EVENTS = [
  { label: '入替', offset: 0 },
  { label: '追肥', offset: 4 },
  { label: '追肥', offset: 9 },
];

// 日付ユーティリティ
function fmt(date) {
  const w = ['日','月','火','水','木','金','土'][date.getDay()];
  return `${date.getFullYear()}年${date.getMonth()+1}月${date.getDate()}日（${w}）`;
}
function fmtShort(date) { return `${date.getMonth()+1}/${date.getDate()}`; }
function fmtMD(date) {
  const w = ['日','月','火','水','木','金','土'][date.getDay()];
  return `${date.getMonth()+1}月${date.getDate()}日（${w}）`;
}
function toDateStr(date) {
  return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
}
function addDays(date, n) { const d = new Date(date); d.setDate(d.getDate()+n); return d; }
function parseDate(str) { const [y,m,d] = str.split('-').map(Number); return new Date(y,m-1,d); }
function isSameDay(a, b) { return toDateStr(a) === toDateStr(b); }

// 表示日（ナビゲーションで変わる）
const realToday = new Date();
let viewDate = new Date(realToday);

function navigate(delta) {
  viewDate = addDays(viewDate, delta);
  renderAll();
}

function goToday() {
  viewDate = new Date(realToday);
  renderAll();
}

function renderHeader() {
  document.getElementById('disp-date').textContent = fmt(viewDate);
  const wrap = document.getElementById('back-today-wrap');
  wrap.innerHTML = isSameDay(viewDate, realToday)
    ? ''
    : `<button class="back-today" onclick="goToday()">今日に戻る</button>`;
}

function makeCard(t, dayLabel, compact) {
  const cls = compact ? `card ${t.cls} compact` : `card ${t.cls}`;
  let histHtml = '';
  if (t.history.length > 0) {
    histHtml = '<div class="history">';
    t.history.forEach((h, i) => {
      const hDate = addDays(t.sow, h.daysFromSow);
      histHtml += `<span class="hist-item"><span>${fmtShort(hDate)}</span> ${h.label}</span>`;
      if (i < t.history.length - 1) histHtml += `<span class="hist-sep">›</span>`;
    });
    histHtml += '</div>';
  }
  if (compact) {
    return `<div class="${cls}">
      <div class="card-task">${t.label}</div>
      <div class="card-sow">${fmtShort(t.sow)}播種</div>
      <div class="card-sub">${t.days}日目</div>
      ${histHtml}
    </div>`;
  }
  return `<div class="${cls}">
    <div class="card-top">
      <div>
        <div class="card-task">${dayLabel}${t.label}</div>
        <div class="card-sow">${fmtShort(t.sow)}播種</div>
      </div>
      <div class="card-sub">播種から${t.days}日目</div>
    </div>
    ${histHtml}
  </div>`;
}

function switchedCell() {
  return `<div class="stage-cell"><div class="card-switched">33日目栽培<br>に切替済</div></div>`;
}
function placeholderCell(text) {
  return `<div class="stage-cell"><div class="card-placeholder">${text}</div></div>`;
}
function cardCell(t, dayLabel) {
  return `<div class="stage-cell">${makeCard(t, dayLabel, true)}</div>`;
}

function renderTasks() {
  const isToday = isSameDay(viewDate, realToday);
  const dayLabel = isToday ? '今日の' : 'この日の';

  const sow30 = addDays(viewDate, -5);
  const sow6  = addDays(viewDate, -14);
  const sow3  = addDays(viewDate, -22);
  const sowOH = addDays(viewDate, -32);
  const sowNH = addDays(viewDate, -33);

  // 各ステージで旧・新が存在するか
  const hasOld = s => s < SOW_OLD_END;
  const hasNew = s => s >= SOW_NEW_START;

  const anyOld = hasOld(sowOH) || hasOld(sow3) || hasOld(sow6) || hasOld(sow30);
  const anyNew = hasNew(sowNH) || hasNew(sow6)  || hasNew(sow30);
  const isMixed = anyOld && anyNew;

  let html = '';

  if (isMixed) {
    html += `<div class="col-header">
      <div class="col-label col-label-old">32日コース</div>
      <div class="col-label col-label-new">33日コース</div>
    </div>`;

    // 行1: 刈取
    const leftH  = hasOld(sowOH)
      ? cardCell({ label:'刈取', cls:'card-刈取', days:32, sow:sowOH, history:[{label:'30穴',daysFromSow:5},{label:'6穴',daysFromSow:14},{label:'3穴',daysFromSow:22}] }, dayLabel)
      : switchedCell();
    const rightH = hasNew(sowNH)
      ? cardCell({ label:'刈取', cls:'card-刈取', days:33, sow:sowNH, history:[{label:'30穴',daysFromSow:5},{label:'6穴',daysFromSow:14}] }, dayLabel)
      : placeholderCell('まだなし');
    html += `<div class="stage-row">${leftH}${rightH}</div>`;

    // 行2: 3穴（左のみ）
    const left3 = hasOld(sow3)
      ? cardCell({ label:'3穴へ移植', cls:'card-3穴', days:22, sow:sow3, history:[{label:'30穴',daysFromSow:5},{label:'6穴',daysFromSow:14}] }, dayLabel)
      : switchedCell();
    html += `<div class="stage-row">${left3}${placeholderCell('3穴なし')}</div>`;

    // 行3: 6穴（同じ播種日で両列に出ることもある）
    const left6  = hasOld(sow6)
      ? cardCell({ label:'6穴へ移植', cls:'card-6穴', days:14, sow:sow6, history:[{label:'30穴',daysFromSow:5}] }, dayLabel)
      : switchedCell();
    const right6 = hasNew(sow6)
      ? cardCell({ label:'6穴へ移植', cls:'card-6穴', days:14, sow:sow6, history:[{label:'30穴',daysFromSow:5}] }, dayLabel)
      : placeholderCell('まだなし');
    html += `<div class="stage-row">${left6}${right6}</div>`;

    // 行4: 30穴（同じ播種日で両列に出ることもある）
    const left30  = hasOld(sow30)
      ? cardCell({ label:'30穴へ移植', cls:'card-30穴', days:5, sow:sow30, history:[] }, dayLabel)
      : switchedCell();
    const right30 = hasNew(sow30)
      ? cardCell({ label:'30穴へ移植', cls:'card-30穴', days:5, sow:sow30, history:[] }, dayLabel)
      : placeholderCell('まだなし');
    html += `<div class="stage-row">${left30}${right30}</div>`;

  } else {
    // 単列表示
    const cards = [];
    if (hasOld(sowOH))
      cards.push({ label:'刈取', cls:'card-刈取', days:32, sow:sowOH, history:[{label:'30穴',daysFromSow:5},{label:'6穴',daysFromSow:14},{label:'3穴',daysFromSow:22}] });
    if (hasNew(sowNH))
      cards.push({ label:'刈取', cls:'card-刈取', days:33, sow:sowNH, history:[{label:'30穴',daysFromSow:5},{label:'6穴',daysFromSow:14}] });
    if (hasOld(sow3))
      cards.push({ label:'3穴へ移植', cls:'card-3穴', days:22, sow:sow3, history:[{label:'30穴',daysFromSow:5},{label:'6穴',daysFromSow:14}] });
    cards.push({ label:'6穴へ移植', cls:'card-6穴', days:14, sow:sow6, history:[{label:'30穴',daysFromSow:5}] });
    cards.push({ label:'30穴へ移植', cls:'card-30穴', days:5, sow:sow30, history:[] });
    html = cards.map(t => makeCard(t, dayLabel, false)).join('');
  }

  document.getElementById('tasks').innerHTML = html;
}

function renderEkihi() {
  const ms = new Date(viewDate.getFullYear(), viewDate.getMonth(), viewDate.getDate()).getTime();
  const daysSinceBase = Math.round((ms - EKIHI_BASE.getTime()) / 86400000);
  const cycleNum = Math.floor(daysSinceBase / 14);
  const hit = EKIHI_EVENTS.find(e => (cycleNum * 14 + e.offset) === daysSinceBase);
  const el = document.getElementById('ekihi-line');
  if (hit) {
    el.textContent = `液肥管理：${hit.label}`;
    el.style.display = '';
  } else {
    el.style.display = 'none';
  }
}

function renderBanner(events) {
  const dateStr = toDateStr(viewDate);
  const matched = events.filter(e => e.date === dateStr);
  const el = document.getElementById('event-banner');
  if (matched.length === 0) { el.innerHTML = ''; return; }
  const items = matched.map(e => `<div class="event-banner-item">★ ${e.note}</div>`).join('');
  el.innerHTML = `<div class="event-banner"><div class="event-banner-title">イレギュラー</div>${items}</div>`;
}

function renderDelivery() {
  // 日=0 月=1 水=3 金=5
  const deliveryDays = [0, 1, 3, 5];
  const el = document.getElementById('delivery-banner');
  el.innerHTML = deliveryDays.includes(viewDate.getDay())
    ? '<div class="delivery-banner">🎒 緑園都市配送</div>'
    : '';
}

function renderAll() {
  renderHeader();
  renderEkihi();
  renderDelivery();
  renderTasks();
  if (cachedEvents) renderBanner(cachedEvents);
}

// 計算機
function chip(label, dayNum, date) {
  const dayStr = dayNum === 0 ? '0日目（播種）' : `${dayNum}日目`;
  return `<div class="calc-chip">
    <div class="chip-label">${label} <span class="chip-day">${dayStr}</span></div>
    <div class="chip-val">${fmtMD(date)}</div>
  </div>`;
}
function switchTab(tab) {
  document.getElementById('tab-sow').classList.toggle('active', tab==='sow');
  document.getElementById('tab-harvest').classList.toggle('active', tab==='harvest');
  document.getElementById('panel-sow').style.display = tab==='sow' ? '' : 'none';
  document.getElementById('panel-harvest').style.display = tab==='harvest' ? '' : 'none';
}
function calcFromSow() {
  const val = document.getElementById('sow-input').value;
  if (!val) return;
  const sow = parseDate(val);
  const isNew = sow >= SOW_OLD_END; // 4/9以降は新のみ
  const sch = isNew
    ? [{ label: '30穴', days: 5 }, { label: '6穴', days: 14 }, { label: '刈取', days: 33 }]
    : [{ label: '30穴', days: 5 }, { label: '6穴', days: 14 }, { label: '3穴', days: 22 }, { label: '刈取', days: 32 }];
  document.getElementById('sow-result').innerHTML =
    [chip('播種日', 0, sow)].concat(sch.map(s => chip(s.label, s.days, addDays(sow, s.days)))).join('');
}
function calcFromHarvest() {
  const val = document.getElementById('harvest-input').value;
  if (!val) return;
  const harvest = parseDate(val);
  const sowIfNew = addDays(harvest, -33);
  const isNew = sowIfNew >= SOW_OLD_END;
  const sow = isNew ? sowIfNew : addDays(harvest, -32);
  const sch = isNew
    ? [{ label: '30穴', days: 5 }, { label: '6穴', days: 14 }, { label: '刈取', days: 33 }]
    : [{ label: '30穴', days: 5 }, { label: '6穴', days: 14 }, { label: '3穴', days: 22 }, { label: '刈取', days: 32 }];
  document.getElementById('harvest-result').innerHTML =
    [chip('播種日', 0, sow)].concat(sch.map(s => chip(s.label, s.days, addDays(sow, s.days)))).join('');
}
document.getElementById('sow-input').value = toDateStr(realToday);
document.getElementById('harvest-input').value = toDateStr(realToday);

// イベント読み込み
let cachedEvents = null;
function parseCSV(text) {
  // セル内改行を含むCSVを正しくパース
  const rows = [];
  let cur = '', inQ = false, cols = [];
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (c === '"') {
      if (inQ && text[i+1] === '"') { cur += '"'; i++; } // エスケープ済み引用符
      else { inQ = !inQ; }
    } else if (c === ',' && !inQ) {
      cols.push(cur); cur = '';
    } else if ((c === '\n' || (c === '\r' && text[i+1] === '\n')) && !inQ) {
      if (c === '\r') i++;
      cols.push(cur); cur = '';
      rows.push(cols); cols = [];
    } else {
      cur += c;
    }
  }
  if (cur || cols.length) { cols.push(cur); rows.push(cols); }

  return rows.slice(1).map(cols => ({
    date: (cols[0] || '').trim(),
    note: (cols[1] || '').trim().replace(/\n/g, ' '),
  })).filter(e => e.date && e.note);
}
async function loadEvents() {
  const status = document.getElementById('sync-status');
  try {
    const res = await fetch(CSV_URL);
    if (!res.ok) throw new Error('fetch failed');
    const text = await res.text();
    cachedEvents = parseCSV(text);
    renderBanner(cachedEvents);
    status.textContent = `最終更新：${fmt(new Date())}`;
    status.className = 'sync-status ok';
  } catch(e) {
    cachedEvents = [];
    renderBanner([]);
    status.textContent = 'スプレッドシートを読み込めませんでした。ネット接続を確認してください。';
    status.className = 'sync-status err';
  }
}

renderAll();
loadEvents();
</script>
</body>
</html>
